id: GDPR
name: General Data Protection Regulation (EU) 2016/679
authority_url: https://eur-lex.europa.eu/eli/reg/2016/679/oj
catalog_version: "2026.07"
last_verified: "2026-07-03"
jurisdiction: EU
clauses:
  - id: "Art.5(1)(c)"
    title: Data minimisation
    applies_to: [pii_field, pii_in_response, pii_over_collection]
    check_hint: "Only personal data necessary for the stated purpose is collected or returned by an endpoint."
  - id: "Art.5(1)(f)"
    title: Integrity and confidentiality
    applies_to: [log_sensitive, pii_in_logs, encryption]
    check_hint: "Personal data is protected against unauthorised processing, loss, or disclosure (e.g. not written to logs in the clear)."
  - id: "Art.6"
    title: Lawfulness of processing
    applies_to: [consent]
    check_hint: "There is a lawful basis (consent, contract, legitimate interest) for processing the data the endpoint handles."
  - id: "Art.15"
    title: Right of access by the data subject
    applies_to: [data_subject_rights]
    check_hint: "The system can produce the personal data it holds about a subject on request."
  - id: "Art.17"
    title: Right to erasure ('right to be forgotten')
    applies_to: [erasure, data_subject_rights]
    check_hint: "The system can delete a subject's personal data on request."
  - id: "Art.25"
    title: Data protection by design and by default
    applies_to: [pii_field, access_control]
    check_hint: "Privacy safeguards (minimisation, access limits) are built into the endpoint by default."
  - id: "Art.32"
    title: Security of processing
    applies_to: [encryption, hardcoded_secret, access_control, sql_concat, id_lookup]
    check_hint: "Appropriate technical measures (encryption, access control, injection-safe queries) protect the data."
  - id: "Art.33"
    title: Notification of a personal data breach
    applies_to: [breach_notification]
    check_hint: "There is a path to detect and report a breach within 72 hours."
